<div class="container py-4">
  <h3 class="mb-3">Add Membership Plan</h3>

  <form [formGroup]="form" (ngSubmit)="submit()" class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Plan Name</label>
      <input type="text" class="form-control" formControlName="name" />
    </div>
    <div class="col-md-4">
      <label class="form-label">Duration</label>
      <input
        type="text"
        class="form-control"
        formControlName="duration"
        placeholder="e.g. 1 month, 3 months, 1 year"
      />
    </div>
    <div class="col-md-4">
      <label class="form-label">Price (₹)</label>
      <input
        type="number"
        class="form-control"
        formControlName="price"
        min="0"
      />
    </div>

    <div class="col-12">
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Save Plan</span>
        <span *ngIf="loading">Saving...</span>
      </button>
    </div>
  </form>

  <div class="mt-3" *ngIf="message" class="alert alert-success">
    {{ message }}
  </div>
  <div class="mt-3" *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>
</div>
