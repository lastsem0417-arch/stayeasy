<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-0">Welcome, {{ auth.getCurrentUser()?.name }}</h2>
      <p class="text-muted mb-0">Manage your gym plans and membership.</p>
    </div>
    <button class="btn btn-outline-danger btn-sm" (click)="logout()">Logout</button>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">View Plans</h5>
          <p class="card-text text-muted">
            Explore available membership plans and join one.
          </p>
          <a routerLink="/member/plans" class="btn btn-primary btn-sm">View Plans</a>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">My Membership</h5>
          <p class="card-text text-muted">
            Check your active and past memberships.
          </p>
          <a routerLink="/member/membership" class="btn btn-secondary btn-sm">View Membership</a>
        </div>
      </div>
    </div>
  </div>
</div>
