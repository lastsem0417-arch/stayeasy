<style>
  /* Main Layout Container */
  div[style*="display:flex;height:100vh"] {
    background-color: #f1f5f9; /* Light gray background */
    font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* Sidebar (Overriding inline #333 background for a professional slate-blue) */
  div[style*="width:220px"] {
    background-color: #1e293b !important; 
    box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05);
    display: flex;
    flex-direction: column;
    z-index: 10;
    transition: all 0.3s ease;
  }

  /* Sidebar Heading */
  div[style*="width:220px"] h3 {
    color: #ffffff;
    font-size: 22px;
    font-weight: 800;
    margin-top: 10px;
    margin-bottom: 30px;
    text-align: center;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #334155;
    padding-bottom: 20px;
  }

  /* Sidebar Links */
  div[style*="width:220px"] a {
    padding: 14px 16px !important;
    margin: 6px 0 !important;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s ease;
    background-color: transparent;
  }

  div[style*="width:220px"] a:hover {
    background-color: #2563eb; /* Blue theme hover */
    color: #ffffff !important;
    transform: translateX(4px);
    box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
  }

  /* Logout Button */
  div[style*="width:220px"] button {
    margin-top: auto !important; /* Pushes button to the very bottom of the flex container */
    padding: 14px 16px;
    background-color: #ef4444; /* Clean red for logout action */
    color: #ffffff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
  }

  div[style*="width:220px"] button:hover {
    background-color: #dc2626;
    box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3);
    transform: translateY(-2px);
  }

  div[style*="width:220px"] button:active {
    transform: translateY(1px);
    box-shadow: 0 2px 8px rgba(239, 68, 68, 0.2);
  }

  /* Main Content Area */
  div[style*="flex:1"] {
    overflow-y: auto;
    padding: 32px !important;
  }

  /* Mobile Responsiveness */
  @media (max-width: 768px) {
    div[style*="display:flex;height:100vh"] {
      flex-direction: column !important;
      height: auto !important;
      min-height: 100vh;
    }

    div[style*="width:220px"] {
      width: 100% !important;
      padding: 20px !important;
      flex-direction: column;
    }

    div[style*="width:220px"] h3 {
      margin-bottom: 20px;
      padding-bottom: 10px;
    }

    div[style*="width:220px"] button {
      margin-top: 20px !important;
    }
    
    div[style*="flex:1"] {
      padding: 20px !important;
    }
  }
</style>

<div style="display:flex;height:100vh">

  <div style="width:220px;background:#333;color:white;padding:15px">
    <h3>Admin Panel</h3>

    <a routerLink="/admin/add-room"
       style="color:white;display:block;margin:10px 0">
      Add Room
    </a>

    <a routerLink="/admin/bookings"
       style="color:white;display:block;margin:10px 0">
      All Bookings
    </a>

    <button style="margin-top:20px" (click)="logout()">
      Logout
    </button>
  </div>

  <div style="flex:1;padding:20px">
    <router-outlet></router-outlet>
  </div>

</div>
