<style>
  /* Navigation Bar Container */
  nav[style*="background"] {
    display: flex !important;
    align-items: center !important;
    background-color: #2563eb !important; /* Modern professional blue */
    padding: 16px 32px !important;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
    font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-sizing: border-box;
  }

  /* Navigation Links */
  nav a {
    color: #ffffff !important;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    margin-right: 8px !important;
    padding: 10px 16px;
    border-radius: 8px;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }

  nav a:hover {
    background-color: rgba(255, 255, 255, 0.15); /* Soft white overlay */
    transform: translateY(-1px);
  }

  nav a:active {
    transform: translateY(1px);
    background-color: rgba(255, 255, 255, 0.25);
  }

  /* Logout Button */
  nav button {
    float: none !important; /* Override inline float */
    margin-left: auto !important; /* Push to the right side using flexbox */
    background-color: #ffffff;
    color: #ef4444; /* Clean red text for logout action */
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  }

  nav button:hover {
    background-color: #fef2f2; /* Light red tint on hover */
    color: #dc2626;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
  }

  nav button:active {
    transform: translateY(1px);
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
  }

  /* Global Body Background Adjustment (Optional but recommended for the theme) */
  body {
    background-color: #f8fafc;
    margin: 0;
  }

  /* Mobile Responsiveness */
  @media (max-width: 600px) {
    nav[style*="background"] {
      padding: 16px 20px !important;
    }

    nav a {
      font-size: 14px;
      padding: 8px 12px;
      margin-right: 4px !important;
    }

    nav button {
      padding: 8px 16px;
      font-size: 14px;
    }
  }
</style>

<nav style="background:#1976d2; color:white; padding:10px">
  <a routerLink="/user/rooms" style="color:white; margin-right:15px">
    Rooms
  </a>

  <a routerLink="/user/my-bookings" style="color:white; margin-right:15px">
    My Bookings
  </a>

  <button
    style="float:right"
    (click)="logout()">
    Logout
  </button>
</nav>

<router-outlet></router-outlet>
